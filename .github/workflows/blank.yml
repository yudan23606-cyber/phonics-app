name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install JDK 17
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq temurin-17-jdk
          sudo update-java-alternatives -s temurin-17-jdk-amd64
          echo "JAVA_HOME=/usr/lib/jvm/temurin-17-jdk-amd64" >> $GITHUB_ENV

      - name: Setup Android SDK
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "/usr/local/lib/android/sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Install Android SDK 35
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"
          sdkmanager --licenses

      - name: Install Node.js 22
        run: |
          curl -fsSL https://deb.nodesource.com/setup_22.x | sudo bash -
          sudo apt-get install -y nodejs
          node --version
          npm --version

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Android project
        run: npx expo prebuild --platform android --clean

      - name: Build APK
        run: cd android && ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: phonics-app-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
