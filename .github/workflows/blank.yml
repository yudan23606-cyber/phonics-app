name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install JDK 17
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq openjdk-17-jdk

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build APK
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
          ANDROID_HOME: /usr/local/lib/android/sdk
        run: |
          npm install --legacy-peer-deps
          npx expo prebuild --platform android --clean

          # Fix 1 - comment out publish config
          PATCH=node_modules/expo-modules-core/android/ExpoModulesCorePlugin.gradle
          sed -i "95s|from components\.release|// from components.release - CI compat|" $PATCH

          # Fix 2 - add plugin repositories to settings.gradle
          SETTINGS=android/settings.gradle
          sed -i "/^pluginManagement {/a\    repositories {\n        gradlePluginPortal()\n        mavenCentral()\n        google()\n    }" $SETTINGS

          # Fix 3 - get expo-modules-core version and add it to all module plugin declarations
          EMC_VER=$(node -p "require('expo-modules-core/package.json').version")
          echo "Expo Modules Core version: $EMC_VER"
          find node_modules -maxdepth 3 -name "build.gradle" -path "*/android/*" | while read f; do
            if grep -q "expo-module-gradle-plugin" "$f" 2>/dev/null; then
              sed -i "s/id 'expo-module-gradle-plugin'/id 'expo-module-gradle-plugin' version '$EMC_VER'/" "$f"
            fi
          done

          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon -Pandroid.compileSdkVersion=34 -Pandroid.buildToolsVersion=34.0.0

      - uses: actions/upload-artifact@v4
        with:
          name: phonics-app-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
