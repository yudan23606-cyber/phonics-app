name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install JDK 17
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq openjdk-17-jdk

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build APK
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
          ANDROID_HOME: /usr/local/lib/android/sdk
        run: |
          npm install --legacy-peer-deps
          npx expo prebuild --platform android --clean

          # Fix ExpoModulesCorePlugin - comment out publish config (not needed for APK build)
          PATCH=node_modules/expo-modules-core/android/ExpoModulesCorePlugin.gradle
          sed -i "95s|from components\.release|// from components.release - CI compat|" $PATCH

          cd android
          chmod +x gradlew
          ./gradlew assembleRelease -Pandroid.compileSdkVersion=34 -Pandroid.buildToolsVersion=34.0.0

      - uses: actions/upload-artifact@v4
        with:
          name: phonics-app-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
